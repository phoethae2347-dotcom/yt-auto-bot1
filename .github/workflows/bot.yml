name: YouTube Auto Bot

concurrency:
  group: youtube-bot
  cancel-in-progress: true

on:
  workflow_dispatch:

  schedule:
    - cron: '0 0 * * *'   # 7 AM Myanmar
    - cron: '0 5 * * *'   # 12 PM
    - cron: '0 12 * * *'  # 7 PM

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      # ===== CHECKOUT =====
      - name: Checkout Repo
        uses: actions/checkout@v4

      # ===== NODE =====
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # ===== SYSTEM DEPENDENCIES =====
      - name: Install FFmpeg + Python
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg python3 python3-pip

      # ===== EDGE TTS (IMPORTANT FIX) =====
      - name: Install edge-tts
        run: pip3 install edge-tts

      # ===== NODE PACKAGES =====
      - name: Install Node Packages
        run: npm install

      # ===== RUN BOT =====
      - name: Run Bot
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          GOOGLE_TOKEN: ${{ secrets.GOOGLE_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: node index.js