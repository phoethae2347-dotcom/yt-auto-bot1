name: YouTube Auto Bot

on:
  workflow_dispatch:

  schedule:
    # Myanmar 7 AM (UTC 00:30)
    - cron: '30 0 * * *'

    # Myanmar 12 PM (UTC 05:30)
    - cron: '30 5 * * *'

    # Myanmar 7 PM (UTC 12:30)
    - cron: '30 12 * * *'

# ← တစ်ချိန်တည်း run နှစ်ခု မဖြစ်အောင်
concurrency:
  group: youtube-bot
  cancel-in-progress: false

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install FFmpeg
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg

      - name: Install edge-tts
        run: pip3 install edge-tts --quiet

      - name: Install Node Packages
        run: npm ci

      - name: Run Bot
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          GOOGLE_TOKEN: ${{ secrets.GOOGLE_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: node index.js